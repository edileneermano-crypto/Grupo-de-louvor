<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Adicionar novos louvores ao repertório do Praise Group." />
  <meta name="theme-color" content="#111111" />

  <title>Novo Louvor - Praise Group</title>

  <link rel="icon" href="imagens/logo.png" />
  <link rel="apple-touch-icon" href="imagens/logo.png" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/repertorio.css">
<link rel="stylesheet" href="css/agenda.css">
<link rel="stylesheet" href="css/modal.css">
<link rel="stylesheet" href="css/novo-louvor.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/responsive.css">

</head>
<body>
  <header>
    <h2>Praise Group</h2>

    <nav id="mainNav">
      <a href="index.html">Home</a>
      <a href="repertorio.html">Repertório</a>
      <a href="agenda.html">Agenda</a>
      <a href="novo-louvor.html">Novo Louvor</a>
    </nav>

    <button
      class="hamburger"
      id="hamburger"
      aria-label="Abrir menu"
      aria-expanded="false"
      aria-controls="mainNav"
      type="button"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="toggle-container">
      <label class="switch" aria-label="Alternar modo escuro">
        <input type="checkbox" id="darkToggle" />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <main>
    <section class="form-card">
      <h1 class="page-title">Adicionar Novo Louvor</h1>

      <select id="pessoa" aria-label="Selecione o ministro">
        <option value="">Selecione o Ministro</option>
        <option value="joao">João</option>
        <option value="antonio">Antonio Carlos</option>
        <option value="sofia">Sofia</option>
        <option value="jessica">Jessica</option>
        <option value="laura">Laura</option>
        <option value="kele">Kele</option>
        <option value="eliana">Eliana</option>
        <option value="edilene">Edilene</option>
        <option value="elaine">Elaine</option>
        <option value="maisa">Maisa</option>
        <option value="kauan">Kauan</option>
        <option value="mulheresjustificadas">Mulheres Justificadas</option>
        <option value="sugestoes">Sugestões</option>
      </select>

      <input type="text" id="nome" placeholder="Nome do Louvor" />
      <input type="url" id="youtube" placeholder="Link YouTube" />
      <input type="url" id="letra" placeholder="Link Letras" />
      <input type="url" id="cifra" placeholder="Link Cifra Club" />

      <button type="button" onclick="salvarLouvor()">Salvar Louvor</button>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
